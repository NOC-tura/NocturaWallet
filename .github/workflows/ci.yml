name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npx eslint 'src/**/*.{ts,tsx}' '__mocks__/**/*.ts'

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npx tsc --noEmit

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npx jest --no-coverage --forceExit

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm audit --omit=dev --audit-level=critical || true

  detox-ios:
    # Enable when Detox is added to package.json and iOS build is configured
    if: false
    needs: [lint, typecheck, unit-tests, audit]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Install Detox CLI
        run: npm install -g detox-cli
      - name: Install CocoaPods
        run: cd ios && bundle install && bundle exec pod install
      - name: Build iOS app
        run: detox build --configuration ios.sim.debug
      - name: Run Detox smoke test
        run: detox test --configuration ios.sim.debug --testNamePattern="Onboarding"
